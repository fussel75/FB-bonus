# docker-compose.yml — BonusTrack-Stack hinter Traefik (host-network)
#
# Setup auf Hostinger Docker Manager:
#   1) Projekt anlegen, Projektname: fb-bonus
#   2) Im .yaml-Editor diese Datei einfügen
#   3) Im Tab "Umgebung" die Variablen aus .env.docker.example setzen
#   4) "Bereitstellen" klicken
#
# Voraussetzungen:
#   - Traefik läuft (auch im host-network ok), Cert-Resolver "letsencrypt"
#   - DNS A-Record fb-bonus.fristd-bau.com → VPS-IP
#   - HTTP→HTTPS-Redirect ist üblicherweise global in Traefik konfiguriert
#     (entrypoints.web.http.redirections.entrypoint.to=websecure); deshalb
#     hier KEIN extra Redirect-Router.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bonustrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bonustrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonustrack -d bonustrack"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fb-bonus

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGUSER: bonustrack
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: postgres
      PGDATABASE: bonustrack
      BACKUP_RETENTION_DAYS: "14"
    volumes:
      - backups:/backups
    networks:
      - fb-bonus
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache dcron > /dev/null
        cat > /etc/periodic/daily/pgbackup <<'EOF'
        #!/bin/sh
        set -e
        DATE=$$(date +%Y-%m-%d_%H%M)
        FILE=/backups/bonustrack-$$DATE.sql.gz
        echo "[backup] starting $$DATE"
        pg_dump -h $$PGHOST -U $$PGUSER $$PGDATABASE | gzip > $$FILE
        echo "[backup] wrote $$FILE ($$(du -h $$FILE | cut -f1))"
        find /backups -name 'bonustrack-*.sql.gz' -type f -mtime +$$BACKUP_RETENTION_DAYS -delete
        echo "[backup] retention done"
        EOF
        chmod +x /etc/periodic/daily/pgbackup
        /etc/periodic/daily/pgbackup
        exec crond -f -l 8

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bonustrack:${POSTGRES_PASSWORD}@postgres:5432/bonustrack
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      PARTNER_API_KEY: ${PARTNER_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL:-admin@bonustrack.app}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-https://bonus.fristd-bau.com,https://fb-bonus.fristd-bau.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      PORT: 5000
      RUN_STAMMDATEN_UPDATE: ${RUN_STAMMDATEN_UPDATE:-false}
    volumes:
      - uploads:/app/packages/backend/uploads
    networks:
      - fb-bonus
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=fb-bonus"

      # ── Haupt-Router: bonus.fristd-bau.com ──────────────────────────────
      - "traefik.http.routers.bonus.rule=Host(`bonus.fristd-bau.com`)"
      - "traefik.http.routers.bonus.entrypoints=websecure"
      - "traefik.http.routers.bonus.tls=true"
      - "traefik.http.routers.bonus.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bonus.service=bonus-app"

      # ── Alt-Domain fb-bonus.fristd-bau.com → 301 zu bonus.fristd-bau.com ─
      - "traefik.http.routers.bonus-legacy.rule=Host(`fb-bonus.fristd-bau.com`)"
      - "traefik.http.routers.bonus-legacy.entrypoints=websecure"
      - "traefik.http.routers.bonus-legacy.tls=true"
      - "traefik.http.routers.bonus-legacy.tls.certresolver=letsencrypt"
      - "traefik.http.routers.bonus-legacy.middlewares=bonus-legacy-redirect"
      - "traefik.http.routers.bonus-legacy.service=bonus-app"
      - "traefik.http.middlewares.bonus-legacy-redirect.redirectregex.regex=^https://fb-bonus\\.fristd-bau\\.com/(.*)"
      - "traefik.http.middlewares.bonus-legacy-redirect.redirectregex.replacement=https://bonus.fristd-bau.com/$${1}"
      - "traefik.http.middlewares.bonus-legacy-redirect.redirectregex.permanent=true"

      # ── Service ─────────────────────────────────────────────────────────
      - "traefik.http.services.bonus-app.loadbalancer.server.port=5000"

volumes:
  pgdata:
  uploads:
  backups:

networks:
  # Fester Name (kein Compose-Prefix), damit traefik.docker.network passt
  fb-bonus:
    name: fb-bonus
